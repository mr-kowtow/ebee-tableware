server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # ── 301 redirects: old product.html?id=X → new SEO slug URLs ─────────────
    location = /product.html {
        set $product_id $arg_id;

        if ($product_id = "knife-set")              { return 301 /products/biodegradable-knife-cutlery-set/; }
        if ($product_id = "spoon-set")              { return 301 /products/biodegradable-spoon-cutlery-set/; }
        if ($product_id = "spoon-set-1000")         { return 301 /products/compostable-spoon-cutlery-1000-piece/; }
        if ($product_id = "fork-set")               { return 301 /products/biodegradable-fork-utensils-set/; }
        if ($product_id = "bowl-450ml")             { return 301 /products/sugarcane-bagasse-bowl-450ml/; }
        if ($product_id = "bowl-550ml")             { return 301 /products/biodegradable-round-bowl-550ml/; }
        if ($product_id = "bowl-750ml")             { return 301 /products/compostable-round-bowl-750ml-with-lid/; }
        if ($product_id = "bowl-650ml-togo")        { return 301 /products/eco-friendly-to-go-bowl-650ml/; }
        if ($product_id = "container-500ml-a")      { return 301 /products/eco-friendly-food-container-500ml/; }
        if ($product_id = "container-500ml-b")      { return 301 /products/sugarcane-food-container-500ml/; }
        if ($product_id = "container-625ml")        { return 301 /products/biodegradable-meal-prep-container-625ml/; }
        if ($product_id = "bowl-650ml-paper")       { return 301 /products/compostable-paper-bowl-650ml/; }
        if ($product_id = "container-750ml")        { return 301 /products/sugarcane-bagasse-container-750ml/; }
        if ($product_id = "bowl-850ml-eco")         { return 301 /products/eco-friendly-paper-bowl-850ml/; }
        if ($product_id = "container-850ml")        { return 301 /products/biodegradable-food-storage-container-850ml/; }
        if ($product_id = "bowl-1000ml")            { return 301 /products/compostable-paper-bowl-1000ml/; }
        if ($product_id = "sugarcane-bowl")         { return 301 /products/sugarcane-fiber-biodegradable-bowl-with-lid/; }
        if ($product_id = "plate-3in-dipping")      { return 301 /products/compostable-3-inch-dipping-plate/; }
        if ($product_id = "plate-5in-brown")        { return 301 /products/natural-unbleached-5-inch-compostable-paper-plate/; }
        if ($product_id = "tray-6in-gathering")     { return 301 /products/biodegradable-6-inch-food-tray/; }
        if ($product_id = "plate-6in-natural")      { return 301 /products/natural-unbleached-6-inch-biodegradable-plate/; }
        if ($product_id = "plate-6in-brown")        { return 301 /products/sugarcane-6-inch-unbleached-brown-paper-plate/; }
        if ($product_id = "plate-6in-square-white") { return 301 /products/white-square-6-inch-compostable-plate/; }
        if ($product_id = "plate-7in-natural")      { return 301 /products/natural-bagasse-7-inch-eco-plate-bbq/; }
        if ($product_id = "plate-7in-white-picnic") { return 301 /products/white-compostable-7-inch-picnic-plate/; }
        if ($product_id = "tray-7in-white")         { return 301 /products/white-7-inch-biodegradable-paper-tray/; }
        if ($product_id = "plate-8in-bagasse-bbq")  { return 301 /products/bagasse-8-inch-compostable-bbq-plate/; }
        if ($product_id = "plate-8in-compostable")  { return 301 /products/compostable-8-inch-disposable-paper-plate/; }
        if ($product_id = "plate-8in-white")        { return 301 /products/white-8-inch-biodegradable-plate-for-parties/; }
        if ($product_id = "plate-9in-compartment-white") { return 301 /products/white-9-inch-compartment-bagasse-plate/; }
        if ($product_id = "plate-9in-3comp-natural") { return 301 /products/natural-9-inch-3-compartment-bagasse-plate/; }
        if ($product_id = "plate-9in-3comp-white")  { return 301 /products/white-9-inch-3-compartment-bagasse-plate/; }
        if ($product_id = "plate-9in-round")        { return 301 /products/compostable-9-inch-round-paper-plate/; }
        if ($product_id = "plate-oval")             { return 301 /products/biodegradable-oval-dinner-plate/; }
        if ($product_id = "plate-sugarcane-compostable") { return 301 /products/sugarcane-compostable-biodegradable-plate/; }
        if ($product_id = "plate-10in-square-white") { return 301 /products/white-square-10-inch-biodegradable-plate/; }
        if ($product_id = "plate-10in-3comp-brown") { return 301 /products/brown-10-inch-3-compartment-bagasse-plate/; }
        if ($product_id = "plate-10in-3comp-white") { return 301 /products/white-10-inch-3-compartment-bagasse-plate/; }
        if ($product_id = "plate-10in-natural")     { return 301 /products/natural-10-inch-eco-sugarcane-plate/; }
        if ($product_id = "plate-10in-white")       { return 301 /products/white-10-inch-biodegradable-plate/; }
        if ($product_id = "plate-12in")             { return 301 /products/compostable-12-inch-biodegradable-paper-plate/; }
        if ($product_id = "tray-500ml-rectangular") { return 301 /products/rectangular-500ml-compostable-food-tray/; }
        if ($product_id = "tray-500ml-large")       { return 301 /products/large-compostable-500ml-disposable-food-tray/; }
        if ($product_id = "platter-bamboo")         { return 301 /products/natural-bamboo-fiber-disposable-dinner-platter/; }
        if ($product_id = "tray-sugarcane-white")   { return 301 /products/white-sugarcane-disposable-food-tray/; }

        # Unknown id — fall through to the file
        try_files $uri $uri/ =404;
    }

    # ── Serve static files ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # ── Cache static assets ───────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|svg|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
